<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الخدمات</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 450px; }
        .card { background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; width: 100%; box-sizing: border-box; }
        h2 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 14px; }
        select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { background-color: #008080; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #005757; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2 id="welcomeMsg">أهلاً بك!</h2>
        <p>اختر الخدمة والعدد المطلوبين لإرسال الطلب بشكل فوري:</p>
        
        <form id="orderForm">
            <select id="service" required>
                <option value="" disabled selected>اختر الخدمة المتاحة...</option>
                <option value="متابعين">طلب متابعين جدد</option>
                <option value="لايكات">طلب لايكات وتفاعل</option>
                <option value="مشاهدات">طلب مشاهدات</option>
            </select>

            <select id="count" required>
                <option value="" disabled selected>اختر العدد المطلوب...</option>
                <option value="1000">1000</option>
                <option value="2000">2000</option>
                <option value="5000">5000</option>
            </select>

            <button type="submit" id="submitBtn">إرسال الطلب للمشرف</button>
        </form>
        <p id="status" style="color: green; margin-top: 10px; font-weight: bold;"></p>
    </div>
</div>

<script>
    const visitorName = localStorage.getItem('visitorName') || 'زائر';
    const username = localStorage.getItem('currentUsername') || 'غير معروف';
    document.getElementById('welcomeMsg').innerText = `أهلاً بك يا ${visitorName}!`;

    // رابط الخزان السحابي الخاص بك لجمع الطلبات
    const cloudUrl = 'https://kvdb.io/MN87XgE9b6vFfR7UqDZm6A/yazan_orders';

    document.getElementById('orderForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'جاري الإرسال سحابياً...';
        btn.disabled = true;

        const service = document.getElementById('service').value;
        const count = document.getElementById('count').value;
        const newOrder = { username: `${visitorName} (${username})`, service, count, time: new Date().toLocaleTimeString('ar-YE') };

        try {
            // جلب الطلبات السابقة من السحاب أولاً
            let res = await fetch(cloudUrl);
            let orders = [];
            if (res.ok) {
                const text = await res.text();
                orders = text ? JSON.parse(text) : [];
            }
            
            // إضافة الطلب الجديد وحفظ القائمة مجدداً في السحاب
            orders.push(newOrder);
            await fetch(cloudUrl, {
                method: 'POST',
                body: JSON.stringify(orders)
            });

            document.getElementById('status').style.color = 'green';
            document.getElementById('status').innerText = 'تم إرسال طلبك عبر السحاب بنجاح!';
            document.getElementById('service').value = '';
            document.getElementById('count').value = '';
        } catch (err) {
            document.getElementById('status').style.color = 'red';
            document.getElementById('status').innerText = 'حدث خطأ في الاتصال بالسحاب، حاول مجدداً.';
        } finally {
            btn.innerText = 'إرسال الطلب للمشرف';
            btn.disabled = false;
        }
    });
</script>
</body>
</html>
