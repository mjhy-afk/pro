<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .container { width: 100%; max-width: 400px; padding: 20px; }
        .card { background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; }
        h2 { color: #333; margin-bottom: 20px; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 15px; }
        button { background-color: #008080; color: white; border: none; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #005757; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>إنشاء حساب / تسجيل الدخول</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="اسم المستخدم الخاص بالحساب (اليوزر)" required>
                <input type="password" id="password" placeholder="كلمة السر" required>
                <button type="submit">دخول لوحة الخدمات</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // هنا حفظنا اليوزر والباسورد مع بعض
            localStorage.setItem('currentUsername', document.getElementById('username').value);
            localStorage.setItem('currentPassword', document.getElementById('password').value);
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
