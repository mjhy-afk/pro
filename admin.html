<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المدير السحابية</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 600px; }
        .card { background: #ffffff; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; width: 100%; box-sizing: border-box; }
        h2 { color: #333; margin-bottom: 50px; }
        p { color: #666; font-size: 14px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; font-size: 14px; }
        th { background-color: #008080; color: white; }
        button { width: 100%; padding: 12px; margin-top: 20px; border: none; border-radius: 5px; box-sizing: border-box; font-size: 15px; background-color: #a04040; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #803030; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h2>لوحة إدارة النظام السحابية (خاصة بـ يزن)</h2>
        <p id="loadingText" style="color: blue;">جاري الاتصال بالسحاب وتحديث البيانات...</p>
        
        <table>
            <thead>
                <tr>
                    <th>العميل (واليوزر)</th>
                    <th>نوع الخدمة</th>
                    <th>العدد</th>
                    <th>الوقت</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
                </tbody>
        </table>
        
        <button onclick="clearCloudData()">تصفير ومسح كافة الطلبات من السحاب</button>
    </div>
</div>

<script>
    const cloudUrl = 'https://kvdb.io/MN87XgE9b6vFfR7UqDZm6A/yazan_orders';

    async function loadAdminData() {
        try {
            let res = await fetch(cloudUrl);
            if (res.ok) {
                const text = await res.text();
                const orders = text ? JSON.parse(text) : [];
                const tableBody = document.getElementById('adminTableBody');
                tableBody.innerHTML = '';

                orders.forEach(item => {
                    const row = `<tr>
                        <td><b>${item.username}</b></td>
                        <td>${item.service}</td>
                        <td>${item.count}</td>
                        <td><span style="color:#777; font-size:12px;">${item.time || ''}</span></td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
                document.getElementById('loadingText').innerText = 'مُتصل بالسحاب والتحديث فوري 🟢';
                document.getElementById('loadingText').style.color = 'green';
            }
        } catch (err) {
            document.getElementById('loadingText').innerText = 'فشل تحديث البيانات، جاري المحاولة ثانية... 🔴';
            document.getElementById('loadingText').style.color = 'red';
        }
    }

    async function clearCloudData() {
        if(confirm("هل أنت متأكد من تصفير ومسح جميع الطلبات من السحاب نهائياً؟")) {
            try {
                await fetch(cloudUrl, { method: 'POST', body: JSON.stringify([]) });
                loadAdminData();
            } catch(e) {
                alert("فشل المسح، تفقد الإنترنت.");
            }
        }
    }

    // جلب فوري وتحديث تلقائي كل 3 ثوانٍ من الإنترنت
    loadAdminData();
    setInterval(loadAdminData, 3000);
</script>

</body>
</html>
